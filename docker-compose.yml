services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # GenAI
      GENAI_TOKEN: ${GENAI_TOKEN}
      GENAI_MODEL: ${GENAI_MODEL:-}
      # Telegram webhook (optional — leave blank to use polling)
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      # Corporate TLS: combined bundle (standard public CAs + Zscaler + Uber CAs).
      # Docker bridge DNS resolves api.telegram.org; this bundle handles Zscaler TLS inspection.
      SSL_CERT_FILE: /app/certs/combined-ca-bundle.pem
      REQUESTS_CA_BUNDLE: /app/certs/combined-ca-bundle.pem
    volumes:
      - ./nichescope:/app/nichescope
      - ./.env:/app/.env:ro
      - ./data:/app/data
