<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NicheScope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 { font-size: 16px; color: #6c63ff; margin-bottom: 12px; }
    label { display: block; font-size: 12px; color: #888; margin-top: 10px; }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
    }
    input:focus { outline: none; border-color: #6c63ff; }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #5a52e0; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
    }
    .status.ok { color: #4ecdc4; }
    .status.err { color: #ff6b6b; }
    .footer { margin-top: 16px; font-size: 11px; color: #555; text-align: center; }
    .footer a { color: #6c63ff; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🔍 NicheScope Settings</h1>

  <label for="apiUrl">API URL</label>
  <input type="text" id="apiUrl" placeholder="http://localhost:8000" />

  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Your NicheScope API key" />

  <label for="nicheId">Niche ID</label>
  <input type="number" id="nicheId" placeholder="1" />

  <button id="saveBtn">Save & Connect</button>

  <div class="status" id="status"></div>

  <div class="footer">
    <a href="https://github.com/yourusername/nichescope" target="_blank">GitHub</a> ·
    <a href="https://nichescope.com" target="_blank">Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
